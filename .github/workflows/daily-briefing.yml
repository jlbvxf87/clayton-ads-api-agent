name: daily-briefing

# Runs once a day, ~9am PT. Snapshots campaign state, evaluates active rules,
# and DMs each whitelisted user a morning briefing.
#
# Cron is in UTC. 16:00 UTC = 9am PDT (Mar–Nov), 8am PST (Nov–Mar).
# We accept the 1h DST drift to avoid duplicate runs.

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch: {}

concurrency:
  group: briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify required secrets are set
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT: ${{ secrets.META_AD_ACCOUNT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=""
          for v in ANTHROPIC_API_KEY META_ACCESS_TOKEN META_AD_ACCOUNT TELEGRAM_BOT_TOKEN SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY; do
            value="${!v}"
            if [ -z "$value" ]; then
              missing="$missing $v"
            else
              echo "  + $v is set (${#value} chars)"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required GitHub secrets:$missing"
            exit 1
          fi

      - run: npm ci
      - run: npm run briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT: ${{ secrets.META_AD_ACCOUNT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-opus-4-7' }}
          ACCOUNT_TZ: ${{ secrets.ACCOUNT_TZ || 'America/Los_Angeles' }}
          BRIEFING_CHAT_IDS: ${{ secrets.BRIEFING_CHAT_IDS }}
